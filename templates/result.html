<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Individual Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="glass-card text-center p-5">
                    <h2 class="mb-4">Student Marksheet</h2>
                    <hr>
                    <div class="text-start">
                        <p><strong>USN:</strong> <span id="res-usn"></span></p>
                        <p><strong>Name:</strong> <span id="res-name"></span></p>
                        <p><strong>Total Marks:</strong> <span id="res-total"></span></p>
                        <p><strong>Percentage:</strong> <span id="res-perc"></span>%</p>
                        <p><strong>Grade:</strong> <span id="res-grade" class="badge bg-primary"></span></p>
                    </div>
                    <a href="/dashboard" class="btn btn-secondary mt-4">Back to Dashboard</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
